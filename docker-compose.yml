version: "3.8"

services:
  backend:
    build: ./backend
    container_name: smart-farm-backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    restart: unless-stopped

  frontend:
    build: ./smart-farm-frontend
    container_name: smart-farm-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
